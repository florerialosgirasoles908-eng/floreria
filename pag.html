<script>
function abrirGaleria(titulo, imagenes){

let nuevaVentana = window.open("", "_blank");

let html = `
<html>
<head>
<title>${titulo}</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#fffbe7;
padding:20px;
}

h1{
color:#c49a00;
}

img{
width:300px;
margin:15px;
border-radius:15px;
box-shadow:0 0 10px gray;
}

button{
padding:10px 20px;
font-size:18px;
background:#f4c542;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>${titulo}</h1>
`;

imagenes.forEach(img => {
html += '<img src="' + img + '">';
});

html += `
<br><br>
<button onclick="window.close()">⬅ Regresar</button>
</body>
</html>
`;

nuevaVentana.document.write(html);
nuevaVentana.document.close();
}
